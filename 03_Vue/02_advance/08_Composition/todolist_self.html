<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input
        id="msg"
        type="text"
        class="form-control"
        name="msg"
        placeholder="할일을 여기에 입력!"
        v-model.trim="todo"
        @keyup.enter="addTodo"
      />
      <span class="btn btn-primary input-group-addon" @click="addTodo"
        >추가</span
      >

      <ul>
        <li
          v-for="todoitem in todolist"
          :key="todoitem.id"
          class="list-group-item"
          :class="{ 'list-group-item-success': todoitem.completed } "
          @click="toggleCompleted(todoitem.id)"
        >
          <span class="pointer" :class="{ 'todo-done': todoitem.completed }">
            {{ todoitem.todo }} {{ todoitem.completed ? '(완료)' : '' }}
          </span>
          <span
            class="float-end badge bg-secondary pointer"
            @click.stop="deleteTodo(todoitem.id)"
            >삭제</span
          >
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      let ts = new Date().getTime();

      createApp({
        setup() {
          const todo = ref('');
          const todolist = ref([
            { id: ts, todo: '자전거 타기', completed: false },
            { id: ts + 1, todo: '딸과 공원 산책', completed: true },
            { id: ts + 2, todo: '일요일 애견 카페', completed: false },
            { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
          ]);

          const addTodo = () => {
            if (todo.value.length >= 2) {
              todolist.value.push({
                id: new Date().getTime(),
                todo: todo.value,
                completed: false,
              });
              todo.value = '';
            }
          };

          const deleteTodo = (id) => {
            let index = todolist.value.findIndex((item) => id === item.id);
            todolist.value.splice(index, 1);
          };

          const toggleCompleted = (id) => {
            let index = todolist.value.findIndex((item) => id === item.id);
            todolist.value[index].completed = !todolist.value[index].completed;
          };

          return {
            todo,
            todolist,
            addTodo,
            deleteTodo,
            toggleCompleted,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
